<!DOCTYPE html>
<html>
<head>
  <title>Luxury Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="initJournal()">

<div class="book">

  <!-- PAGE 1 -->
  <div class="page active">
    <h2>🌸 How are you feeling today?</h2>

    <button>😊 Happy</button>
    <button>😔 Sad</button>
    <button>😡 Angry</button>
    <button>😶 Numb</button>
  </div>

  <!-- PAGE 2 -->
  <div class="page">
    <h2>💖 Reflection</h2>
    <textarea placeholder="What happened today?"></textarea>
  </div>

  <!-- PAGE 3 -->
  <div class="page">
    <h2>🤍 Vent Session</h2>
    <textarea id="ventBox" placeholder="Say anything..."></textarea>
    <button onclick="vent()">Release</button>
  </div>

  <!-- PAGE 4 -->
  <div class="page">
    <h2>📸 Add Memory</h2>
    <input type="file" id="imageUpload">
    <img id="preview" width="150">
  </div>

  <!-- PAGE 5 -->
  <div class="page">
    <h2>✨ You are loved</h2>
    <p id="affirmation"></p>
  </div>

</div>

<br>

<button onclick="prevPage()">⬅</button>
<button onclick="nextPage()">➡</button>

<script src="app.js"></script>

</body>
</html>
