<!DOCTYPE html>
<html>
<head>
  <title>Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="initJournal()">

<div class="book">

  <!-- PAGE 1 -->
  <div class="page">
    <div class="card">
      <h2>✨ Affirmation of the Day</h2>
      <div id="affirmation"></div>
      <textarea id="affNote" placeholder="How does this feel to you?"></textarea>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page">
    <div class="card">
      <h2>📖 Dear Diary</h2>
      <textarea id="diary">Today I felt...
        
  What happened...

What I learned...

Grateful for...</textarea>
    </div>
  </div>

  <!-- PAGE 3 -->
  <div class="page">
    <div class="card">
      <h2>💭 Innter Thoughts</h2>
      <textarea id="free" placeholder="Write anything..."></textarea>
    </div>
  </div>

  <!-- PAGE 4 -->
  <div class="page">
    <div class="card">
      <h2>🌿 Glow Up Check</h2>

    <label><input type="checkbox"> Hydrated 💧</label>
    <label><input type="checkbox"> Moved my body 🏃‍♀️</label>
    <label><input type="checkbox"> Ate well 🥗</label>
    <label><input type="checkbox"> Took care of myself 💆‍♀️</label>
  </div>

    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
