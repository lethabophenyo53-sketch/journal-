<!DOCTYPE html>
<html>
<head>
  <title>Glow Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="initJournal()">

<div class="book">

 <div class="page">
  <div class="card">
    <h2>✨ Affirmation of the Day</h2>
    <div id="affirmation"></div>
    <textarea placeholder="How does this make you feel?"></textarea>
  </div>
</div>

  <div class="page">
    <h2>📖 Dear Diary</h2>
    <textarea id="diary">Today I felt...

What happened...

What I learned...

Grateful for...</textarea>
  </div>

  <div class="page">
    <h2>💭 Inner Thoughts</h2>
    <textarea id="free" placeholder="Write freely..."></textarea>
  </div>

  <div class="page">
    <h2>🌿 Daily Check-In</h2>
    <label><input type="checkbox"> Hydrated 💧</label>
    <label><input type="checkbox"> Moved my body 🏃‍♀️</label>
    <label><input type="checkbox"> Ate well 🥗</label>
    <label><input type="checkbox"> Took care of myself 💆‍♀️</label>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
