<!DOCTYPE html>
<html>
<head>
  <title>Glow Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h1>🌸 Glow Journal</h1>

    <!-- 💖 IMAGE HERE -->
    <img src="https://i.pinimg.com/564x/7f/4c/5c/7f4c5c1f3a4d3c9c3b6a8c7c8f9f9f9f.jpg" width="120" style="border-radius:20px;">

    <h2 id="bigMessage"></h2>
    <p id="affirmation"></p>
    <p id="prompt"></p>

    <h3>How are you feeling?</h3>
    <div class="moods">
      <button onclick="setMood('😊')">😊</button>
      <button onclick="setMood('😔')">😔</button>
      <button onclick="setMood('😡')">😡</button>
      <button onclick="setMood('😌')">😌</button>
      <button onclick="setMood('🤯')">🤯</button>
    </div>

    <p id="selectedMood"></p>

    <textarea id="entry">
Dear Diary...

Today I feel:

What happened today:

One thing I learned:

Grateful for:
    </textarea>

    <button onclick="saveEntry()">Save Entry</button>
    <button onclick="logout()">Logout</button>

    <h3>🌱 Your Journey</h3>
    <div id="entries"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
