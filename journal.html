<!DOCTYPE html>
<html>
<head>
  <title>Glow Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="initJournal()">

<div class="book">

  <!-- PAGE 1: AFFIRMATION -->
  <div class="page">
    <div class="card">
      <h2>✨ Affirmation of the Day</h2>
      <div id="affirmation"></div>
      <textarea id="affNote" placeholder="Write how this affirmation makes you feel..."></textarea>
    </div>
  </div>

  <!-- PAGE 2: DIARY -->
  <div class="page">
    <div class="card">
      <h2>📖 Dear Diary</h2>
      <textarea id="diary" placeholder="Today I felt... What happened today..."></textarea>
    </div>
  </div>

  <!-- PAGE 3: FREE WRITE -->
  <div class="page">
    <div class="card">
      <h2>💭 Free Writing Space</h2>
      <textarea id="free" placeholder="Write anything from your mind..."></textarea>
    </div>
  </div>

  <!-- PAGE 4: GLOW UP CHECK -->
  <div class="page">
    <div class="card">
      <h2>🌿 Glow Up Check</h2>

      <label><input type="checkbox"> Drank Water 💧</label>
      <label><input type="checkbox"> Exercised 🏃‍♀️</label>
      <label><input type="checkbox"> Ate Healthy 🥗</label>
      <label><input type="checkbox"> Self-care 💆‍♀️</label>
      <label><input type="checkbox"> Positive Mindset 💖</label>

    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
