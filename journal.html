<!DOCTYPE html>
<html>
<head>
  <title>Glow Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="initJournal()">

<div class="book">

  <!-- PAGE 1 -->
  <div class="page active">
    <h2>🌸 Today’s Story</h2>
    <p id="story"></p>
  </div>

  <!-- PAGE 2 -->
  <div class="page">
    <h2>💖 How are you feeling?</h2>
    <textarea class="journalBox" placeholder="Write your day..."></textarea>
  </div>

  <!-- PAGE 3 (AI THERAPIST) -->
  <div class="page">
    <h2>🧠 Vent to me</h2>
    <textarea id="ventBox" class="journalBox" placeholder="Talk to me..."></textarea>
    <button onclick="vent()">Send</button>

    <div id="aiReply" class="aiBox"></div>
  </div>

  <!-- PAGE 4 -->
  <div class="page">
    <h2>🌱 Glow Up</h2>
    <label><input type="checkbox"> Drink water</label>
    <label><input type="checkbox"> Skincare</label>
    <label><input type="checkbox"> Shower</label>
    <label><input type="checkbox"> Eat well</label>
  </div>

  <!-- PAGE 5 -->
  <div class="page">
    <h2>📖 Your Story</h2>
    <textarea class="journalBox"></textarea>
    <button onclick="generateMotivation()">✨ Motivate me</button>
    <p id="motivationBoost"></p>
  </div>

  <!-- PAGE 6 -->
  <div class="page">
    <h2>✨ Affirmation</h2>
    <p id="affirmation"></p>
  </div>

  <!-- PAGE 7 -->
  <div class="page">
    <h2>🌙 Closing Message</h2>
    <p id="poem"></p>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
