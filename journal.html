<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veloura Journal</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="book">

  <div class="page active">
    <img src="Cover page.jpg" class="bg">
  </div>

  <div class="page">
    <img src="belongs to page.jpg" class="bg">
  </div>

  <div class="page">
    <img src="Daily task.jpg" class="bg">
    <textarea class="input gratitude" id="gratitude" placeholder="Gratitude..."></textarea>
    <textarea class="input affirm" id="affirm" placeholder="Affirmations..."></textarea>
  </div>

  <div class="page">
    <img src="Weekly planner.jpg" class="bg">
    <textarea class="input tasks" id="tasks" placeholder="Weekly tasks..."></textarea>
  </div>

  <div class="page">
    <img src="notes.jpg" class="bg">
    <textarea class="input notes" id="notes" placeholder="Notes..."></textarea>
  </div>

  <div class="page">
    <img src="Daily Affirmation.jpg" class="bg">
    <textarea class="input story" id="story" placeholder="Write here..."></textarea>
  </div>

  <div class="page">
    <img src="Real story.jpg" class="bg"></div>

  <div class="page">
    <img src="Glow routine.jpg" class="bg"></div>

  <div class="page">
    <img src="Closing page.jpg" class="bg">
    <textarea class="input closing" id="closing" placeholder="Closing thoughts..."></textarea>
  </div>

</div>

<div class="nav">
  <button onclick="prevPage()">⬅</button>
  <button onclick="nextPage()">➡</button>
</div>

<script src="app.js"></script>

</body>
</html>
