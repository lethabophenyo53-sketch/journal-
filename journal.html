<!DOCTYPE html>
<html>
<head>
  <title>Glow Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="initJournal()">

<div class="book">

  <!-- HEADER -->
  <div class="header">
    <h1>💖 Glow Journal</h1>
    <p>Your safe space to feel, heal & grow</p>
  </div>

  <div class="page active">

    <!-- STORY -->
    <h2>🌸 Today’s Story</h2>
    <p id="story"></p>

    <hr>

    <!-- FEELINGS -->
    <h2>💖 How are you feeling?</h2>
    <textarea class="journalBox" placeholder="Start writing your day here..."></textarea>

    <hr>

    <!-- VENT -->
    <h2>🧠 Vent Space</h2>
    <textarea class="journalBox" id="ventBox" placeholder="Say anything..."></textarea>
    <button onclick="vent()">Release feelings</button>

    <hr>

    <!-- GLOW UP -->
    <h2>🌱 Glow Up Checklist</h2>
    <label><input type="checkbox"> Drink water</label><br>
    <label><input type="checkbox"> Skincare</label><br>
    <label><input type="checkbox"> Shower</label><br>
    <label><input type="checkbox"> Eat well</label><br>
    <label><input type="checkbox"> Rest</label>

    <hr>

    <!-- YOUR STORY -->
    <h2>📖 Your Own Story</h2>
    <textarea class="journalBox" placeholder="Write your personal story here..."></textarea>

    <button onclick="generateMotivation()">✨ Give me motivation</button>
    <p id="motivationBoost"></p>

    <hr>

    <!-- AFFIRMATION -->
    <h2>✨ Affirmation</h2>
    <p id="affirmation"></p>

    <hr>

    <!-- CLOSING -->
    <h2>🌙 Closing Message</h2>
    <p id="poem"></p>

  </div>

</div>

<div class="nav">
  <button onclick="prevPage()">⬅</button>
  <button onclick="nextPage()">➡</button>
</div>

<script src="app.js"></script>

</body>
</html>
