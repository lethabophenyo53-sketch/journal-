<!DOCTYPE html>
<html>
<head>
  <title>Growth Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h1>🌸 Growth Journal</h1>

    <button onclick="toggleDarkMode()">🌙 Toggle Mode</button>

    <p id="affirmation"></p>
    <p id="prompt"></p>

    <h3>Today's Mood</h3>
    <div class="moods">
      <button onclick="setMood('😊')">😊</button>
      <button onclick="setMood('😔')">😔</button>
      <button onclick="setMood('😡')">😡</button>
      <button onclick="setMood('😌')">😌</button>
      <button onclick="setMood('🤯')">🤯</button>
    </div>

    <p id="selectedMood"></p>

    <textarea id="entry" placeholder="Dear Diary..."></textarea>

    <button onclick="saveEntry()">Save</button>
    <button onclick="logout()">Logout</button>

    <h3>📅 Your Entries</h3>
    <div id="entries"></div>

    <h3>📊 Mood Summary</h3>
    <div id="moodStats"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
