<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veloura Journal</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- COVER -->
<div class="cover" onclick="openBook()">
  <img src="images/cover.jpg">
  <h1>Click to Open Journal</h1>
</div>

<!-- BOOK -->
<div class="book" id="book">

  <div class="page active">
    <h2>This book belongs to</h2>
    <input id="name" placeholder="Name">
    <input id="line" placeholder="Two lines...">
  </div>

  <div class="page">
    <h2>Daily Tasks</h2>
    <textarea id="daily"></textarea>
  </div>

  <div class="page">
    <h2>Weekly Planner</h2>
    <textarea id="weekly"></textarea>
  </div>

  <div class="page">
    <h2>Notes</h2>
    <textarea id="notes"></textarea>
  </div>

  <div class="page">
    <h2>Real Story</h2>
    <textarea id="story"></textarea>
  </div>

  <div class="page">
    <h2>Glow Routine</h2>
    <textarea id="glow"></textarea>
  </div>

  <div class="page">
    <h2>Closing</h2>
    <textarea id="close"></textarea>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
</div>

<script src="app.js"></script>
</body>
</html>
