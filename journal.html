<!DOCTYPE html>
<html>
<head>
  <title>Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="initJournal()">

<div class="book">

  <!-- PAGE 1 -->
  <div class="page">
    <div class="card">
      <h2>✨ Affirmation of the Day</h2>
      <div id="affirmation"></div>
      <textarea id="affNote" placeholder="How does this feel to you?"></textarea>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page">
    <div class="card">
      <h2>📖 Dear Diary</h2>
      <textarea id="diary" placeholder="Today I felt..."></textarea>
    </div>
  </div>

  <!-- PAGE 3 -->
  <div class="page">
    <div class="card">
      <h2>💭 Free Writing</h2>
      <textarea id="free" placeholder="Write anything..."></textarea>
    </div>
  </div>

  <!-- PAGE 4 -->
  <div class="page">
    <div class="card">
      <h2>🌿 Glow Up Check</h2>

      <label><input type="checkbox"> Drink Water 💧</label>
      <label><input type="checkbox"> Exercise 🏃‍♀️</label>
      <label><input type="checkbox"> Eat Healthy 🥗</label>
      <label><input type="checkbox"> Self-care 💆‍♀️</label>

    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
