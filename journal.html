<!DOCTYPE html>
<html>
<head>
  <title>Glow Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="book">

  <!-- 🌸 PAGE 1 -->
  <div class="page">
    <h2>✨ Affirmation of the Day</h2>
    <p class="bigAffirmation" id="affirmation"></p>

    <textarea placeholder="How does this make you feel?"></textarea>
  </div>

  <!-- 🌱 PAGE 2 -->
  <div class="page">
    <h2>🌱 Dear Diary...</h2>

    <textarea>
Today I feel...

What happened today...

What I learned...

Grateful for...
    </textarea>
  </div>

  <!-- 💭 PAGE 3 -->
  <div class="page">
    <h2>💭 Free Your Mind</h2>

    <textarea placeholder="Write anything... no rules 💖"></textarea>
  </div>

  <!-- ✨ PAGE 4 -->
  <div class="page">
    <h2>✨ Glow Up Check</h2>

    <p><input type="checkbox"> Drank water 💧</p>
    <p><input type="checkbox"> Exercised 🏃‍♀️</p>
    <p><input type="checkbox"> Took care of yourself 💆‍♀️</p>
    <p><input type="checkbox"> Positive mindset 💖</p>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
