<!DOCTYPE html>
<html>
<head>
  <title>Veloura Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="book">

  <div class="page active">
    <img src="images/cover.jpg" class="bg">
  </div>

  <div class="page">
    <img src="images/belongs.jpg" class="bg">
  </div>

  <div class="page">
    <img src="images/gratitude.jpg" class="bg">
    <textarea class="input gratitude" id="gratitude"></textarea>
    <textarea class="input affirm" id="affirm"></textarea>
  </div>

  <div class="page">
    <img src="images/daily-task.jpg" class="bg">
    <textarea class="input tasks" id="tasks"></textarea>
  </div>

  <div class="page">
    <img src="images/notes.jpg" class="bg">
    <textarea class="input notes" id="notes"></textarea>
  </div>

  <div class="page">
    <img src="images/real-story.jpg" class="bg">
    <textarea class="input story" id="story"></textarea>
  </div>

  <div class="page">
    <img src="images/glow.jpg" class="bg">
  </div>

  <div class="page">
    <img src="images/weekly.jpg" class="bg">
  </div>

  <div class="page">
    <img src="images/closing.jpg" class="bg">
    <textarea class="input closing" id="closing"></textarea>
  </div>

</div>

<div class="nav">
  <button onclick="prevPage()">⬅</button>
  <button onclick="nextPage()">➡</button>
</div>

<script src="app.js"></script>
</body>
</html>
