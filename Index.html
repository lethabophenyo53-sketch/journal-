<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Journal</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>✨ Daily Journal</h1>

  <p id="affirmation"></p>

  <h3>How do you feel today?</h3>
  <textarea id="entry"></textarea>

  <button onclick="saveEntry()">Save Entry</button>
</div>

<script>
  const affirmations = [
    "I am strong and capable 💪",
    "Today is a fresh start 🌅",
    "I believe in myself ✨",
    "I am enough ❤️"
  ];

  document.getElementById("affirmation").innerText =
    affirmations[Math.floor(Math.random() * affirmations.length)];

  function saveEntry() {
    const text = document.getElementById("entry").value;
    localStorage.setItem("journalEntry", text);
    alert("Saved!");
  }

  // Load saved entry
  document.getElementById("entry").value =
    localStorage.getItem("journalEntry") || "";
</script>

</body>
</html>
